name: 🤖 Raspadores Autónomos

# ─────────────────────────────────────────────────────────────────────────────
# PORTALES ACTIVOS:
#   Agencias  → Tecnocasa · Redpiso · Monapart · pisos.com · Gilmar
#   Banca     → Solvia (Sabadell) · Aliseda (Santander/Blackstone)
#   Particular→ pisos.com Particulares · Milanuncios Particulares
#
# PORTALES PROHIBIDOS (agregadores / riesgo legal):
#   ✗ mitula  ✗ kelify  ✗ trovit  ← NUNCA añadir
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Cada 6 horas: 00:00, 06:00, 12:00, 18:00 UTC (02:00, 08:00, 14:00, 20:00 España)
    - cron: '0 */6 * * *'

  workflow_dispatch:
    inputs:
      scraper:
        description: 'Scraper a ejecutar'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tecnocasa
          - redpiso
          - monapart
          - pisoscom
          - gilmar
          - pisoscom_particulares
          - milanuncios_particulares
          - fotocasa_particulares
          - solvia
          - aliseda
      max:
        description: 'Máx. anuncios / páginas por ciudad'
        required: false
        default: '50'

env:
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

# ══════════════════════════════════════════════════════════════════════════════
# BLOQUE 1 — AGENCIAS
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  # ─── 🏢 Tecnocasa ───────────────────────────────────────────────────────────
  tecnocasa:
    name: "🏢 [Tecnocasa] ${{ matrix.city }} — ${{ matrix.operation }}"
    if: ${{ github.event_name == 'schedule' || inputs.scraper == 'all' || inputs.scraper == 'tecnocasa' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        city: [madrid, barcelona, valencia, sevilla]
        operation: [sale, rent]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar Chromium (si no está en caché)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --yes playwright install chromium --with-deps

      - name: Instalar dependencias SO de Chromium (siempre)
        run: npx --yes playwright install-deps chromium

      - name: 🤖 Ejecutar scraper
        run: |
          MAX=${{ github.event.inputs.max || '50' }}
          npx --yes tsx scripts/scrapers/tecnocasa.ts \
            --city ${{ matrix.city }} \
            --operation ${{ matrix.operation }} \
            --max $MAX \
            --headless true
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ─── 🏢 Redpiso ─────────────────────────────────────────────────────────────
  redpiso:
    name: "🏢 [Redpiso] ${{ matrix.city }} — ${{ matrix.operation }}"
    if: ${{ github.event_name == 'schedule' || inputs.scraper == 'all' || inputs.scraper == 'redpiso' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        city: [madrid, barcelona, valencia, sevilla]
        operation: [sale, rent]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar Chromium (si no está en caché)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --yes playwright install chromium --with-deps

      - name: Instalar dependencias SO de Chromium (siempre)
        run: npx --yes playwright install-deps chromium

      - name: 🤖 Ejecutar scraper
        run: |
          MAX=${{ github.event.inputs.max || '50' }}
          npx --yes tsx scripts/scrapers/redpiso.ts \
            --city ${{ matrix.city }} \
            --operation ${{ matrix.operation }} \
            --max $MAX \
            --headless true
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ─── 🏢 Monapart ────────────────────────────────────────────────────────────
  monapart:
    name: "🏢 [Monapart] ${{ matrix.operation }}"
    if: ${{ github.event_name == 'schedule' || inputs.scraper == 'all' || inputs.scraper == 'monapart' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        operation: [sale, rent]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar Chromium (si no está en caché)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --yes playwright install chromium --with-deps

      - name: Instalar dependencias SO de Chromium (siempre)
        run: npx --yes playwright install-deps chromium

      - name: 🤖 Ejecutar scraper
        run: |
          MAX=${{ github.event.inputs.max || '50' }}
          npx --yes tsx scripts/scrapers/monapart.ts \
            --operation ${{ matrix.operation }} \
            --max $MAX \
            --headless true
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ─── 🏢 pisos.com (general — agencias + mixto) ─────────────────────────────
  pisoscom:
    name: "🏢 [pisos.com] ${{ matrix.city }} — ${{ matrix.operation }}"
    if: ${{ github.event_name == 'schedule' || inputs.scraper == 'all' || inputs.scraper == 'pisoscom' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        city: [madrid, barcelona, valencia, sevilla, zaragoza, malaga]
        operation: [venta, alquiler]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: 🤖 Ejecutar scraper
        run: |
          MAX_PAGES=${{ github.event.inputs.max || '5' }}
          npx --yes tsx scripts/scrapers/pisoscom.ts \
            ${{ matrix.operation }} \
            ${{ matrix.city }} \
            $MAX_PAGES
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ─── 🏢 Gilmar ──────────────────────────────────────────────────────────────
  gilmar:
    name: "🏢 [Gilmar] ${{ matrix.operation }}"
    if: ${{ github.event_name == 'schedule' || inputs.scraper == 'all' || inputs.scraper == 'gilmar' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        operation: [venta, alquiler]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: 🤖 Ejecutar scraper
        run: |
          MAX=${{ github.event.inputs.max || '300' }}
          npx --yes tsx scripts/scrapers/gilmar.ts \
            ${{ matrix.operation }} \
            $MAX
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

# ══════════════════════════════════════════════════════════════════════════════
# BLOQUE 3 — BANCA
# ══════════════════════════════════════════════════════════════════════════════
  # ─── 🏦 Solvia (Banco Sabadell / Intrum) ────────────────────────────────────
  # NOTA: haya.es fue absorbida por Solvia en 2023, este job cubre ambas marcas
  solvia:
    name: "🏦 [Solvia] ${{ matrix.operation }}"
    if: ${{ github.event_name == 'schedule' || inputs.scraper == 'all' || inputs.scraper == 'solvia' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        operation: [venta, alquiler]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: 🤖 Ejecutar scraper
        run: |
          npx --yes tsx scripts/scrapers/solvia.ts \
            ${{ matrix.operation }} \
            5
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ─── 🏦 Aliseda (Banco Santander / Blackstone) ─────────────────────────────
  aliseda:
    name: "🏦 [Aliseda] ${{ matrix.operation }}"
    if: ${{ github.event_name == 'schedule' || inputs.scraper == 'all' || inputs.scraper == 'aliseda' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        operation: [venta, alquiler]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar Chromium (si no está en caché)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --yes playwright install chromium --with-deps

      - name: Instalar dependencias SO de Chromium (siempre)
        run: npx --yes playwright install-deps chromium

      - name: 🤖 Ejecutar scraper
        run: |
          npx --yes tsx scripts/scrapers/aliseda.ts \
            ${{ matrix.operation }} \
            all \
            5
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

# ══════════════════════════════════════════════════════════════════════════════
# BLOQUE 2 — PARTICULARES  (solo VENTA — alquiler tiene demasiado ruido de agencias)
# ══════════════════════════════════════════════════════════════════════════════
  # ─── 🏠 pisos.com Particulares ──────────────────────────────────────────────
  pisoscom_particulares:
    name: "🏠 [Particulares pisos.com] ${{ matrix.city }} — Venta"
    if: ${{ github.event_name == 'schedule' || inputs.scraper == 'all' || inputs.scraper == 'pisoscom_particulares' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        city: [madrid, barcelona, valencia, sevilla, zaragoza, malaga]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: 🤖 Ejecutar scraper
        run: |
          npx --yes tsx scripts/scrapers/particulares_master.ts \
            venta \
            ${{ matrix.city }} \
            3
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ─── 🔥 Milanuncios Particulares ────────────────────────────────────────────
  milanuncios_particulares:
    name: "🔥 [Milanuncios] ${{ matrix.city }} — Venta"
    if: ${{ github.event_name == 'schedule' || inputs.scraper == 'all' || inputs.scraper == 'milanuncios_particulares' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        city: [madrid, barcelona, valencia, sevilla, zaragoza, malaga]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar Chromium (si no está en caché)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --yes playwright install chromium --with-deps

      - name: Instalar dependencias SO de Chromium (siempre)
        run: npx --yes playwright install-deps chromium

      - name: 🤖 Ejecutar scraper
        run: |
          npx --yes tsx scripts/scrapers/milanuncios_particulares.ts \
            venta \
            ${{ matrix.city }} \
            5
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ─── 🏠 Fotocasa Particulares ───────────────────────────────────────────
  fotocasa_particulares:
    name: "🏠 [Fotocasa] ${{ matrix.city }} — Venta"
    if: ${{ github.event_name == 'schedule' || inputs.scraper == 'all' || inputs.scraper == 'fotocasa_particulares' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        city: [madrid, barcelona, valencia, sevilla, zaragoza, malaga]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar Chromium (si no está en caché)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --yes playwright install chromium --with-deps

      - name: Instalar dependencias SO de Chromium (siempre)
        run: npx --yes playwright install-deps chromium

      - name: 🤖 Ejecutar scraper
        run: |
          npx --yes tsx scripts/scrapers/fotocasa_particulares.ts \
            venta \
            ${{ matrix.city }} \
            3
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar Chromium (si no está en caché)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --yes playwright install chromium --with-deps

      - name: Instalar dependencias SO de Chromium (siempre)
        run: npx --yes playwright install-deps chromium

      - name: 🤖 Ejecutar scraper
        run: |
          npx --yes tsx scripts/scrapers/milanuncios_particulares.ts \
            venta \
            ${{ matrix.city }} \
            5
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

# ══════════════════════════════════════════════════════════════════════════════
# POST-PROCESO
# ══════════════════════════════════════════════════════════════════════════════
  # ─── 📊 Resumen final ───────────────────────────────────────────────────────
  resumen:
    name: "📊 Resumen de ejecución"
    runs-on: ubuntu-latest
    needs:
      - tecnocasa
      - redpiso
      - monapart
      - pisoscom
      - gilmar
      - pisoscom_particulares
      - milanuncios_particulares
      - fotocasa_particulares
      - solvia
      - aliseda
    if: always()
    steps:
      - name: Generar resumen
        run: |
          echo "## 🤖 Raspadores Autónomos — Resultado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Robot | Tipo | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🏢 Tecnocasa | Agencia | ${{ needs.tecnocasa.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏢 Redpiso | Agencia | ${{ needs.redpiso.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏢 Monapart | Agencia | ${{ needs.monapart.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏢 pisos.com General | Agencia + Mixto | ${{ needs.pisoscom.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏢 Gilmar | Agencia | ${{ needs.gilmar.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏠 pisos.com Particulares | Particular (solo venta) | ${{ needs.pisoscom_particulares.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔥 Milanuncios Particulares | Particular (solo venta) | ${{ needs.milanuncios_particulares.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏠 Fotocasa Particulares | Particular (solo venta) | ${{ needs.fotocasa_particulares.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏦 Solvia (Banco Sabadell) | Banca | ${{ needs.solvia.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏦 Aliseda (Santander/Blackstone) | Banca | ${{ needs.aliseda.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ **Portales prohibidos**: mitula · kelify · trovit — nunca añadir" >> $GITHUB_STEP_SUMMARY

  # ─── 🧠 Normalización de títulos con IA ─────────────────────────────────────
  normalize_titles:
    name: "🧠 Normalizar títulos con IA"
    runs-on: ubuntu-latest
    needs:
      - tecnocasa
      - redpiso
      - monapart
      - pisoscom
      - gilmar
      - pisoscom_particulares
      - milanuncios_particulares
      - fotocasa_particulares
      - solvia
      - aliseda
    if: always() && needs.tecnocasa.result != 'cancelled'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: 🧠 Normalizar títulos (OpenRouter — límite 150)
        run: npx --yes tsx scripts/normalize-titles.ts --limit 150
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}


